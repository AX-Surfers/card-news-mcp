<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 720px;
    height: 900px;
    overflow: hidden;
    font-family: '{{font}}', 'Pretendard', 'Noto Sans KR', sans-serif;
    /* 솔리드 다크 배경 — 상단 이미지 밴드 + 하단 텍스트 패널 분리형 */
    background: #0b0d0f;
    display: flex;
    flex-direction: column;
    position: relative;
  }

  /* 상단 이미지 밴드 — 잘림 없이 전체(contain), 상단 고정 */
  .image-zone {
    width: 100%;
    height: 452px;
    flex: 0 0 auto;
    overflow: hidden;
  }

  .image-zone img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    object-position: center top;
    display: block;
  }

  .image-zone .fallback {
    width: 100%;
    height: 100%;
    background: linear-gradient(135deg, #0573F0 0%, #0a2540 100%);
  }

  /* 하단 솔리드 텍스트 패널 */
  .content {
    flex: 1 1 auto;
    display: flex;
    flex-direction: column;
    justify-content: flex-start;
    padding: 40px 48px 84px;
  }

  /* 원형 숫자 뱃지 — 브랜드 블루 */
  .page-badge {
    width: 54px;
    height: 54px;
    border-radius: 50%;
    background: {{primary_color}};
    color: #ffffff;
    font-size: 25px;
    font-weight: 800;
    display: flex;
    align-items: center;
    justify-content: center;
    margin-bottom: 24px;
    box-shadow: 0 4px 16px rgba(5,115,240,0.4);
  }

  .heading {
    font-size: 46px;
    font-weight: 800;
    color: #ffffff;
    line-height: 1.22;
    letter-spacing: -0.04em;
    word-break: keep-all;
    margin-bottom: 20px;
  }

  /* 브랜드 액센트 밑줄 */
  .accent-underline {
    width: 48px;
    height: 4px;
    background: {{accent_color}};
    border-radius: 3px;
    margin-bottom: 24px;
  }

  .body-text {
    font-size: 20px;
    font-weight: 400;
    color: rgba(255,255,255,0.86);
    line-height: 1.72;
    word-break: keep-all;
    white-space: pre-line;
  }

  /* 우하단 브랜드 이미지 */
  .brand-bottom {
    position: absolute;
    right: 48px;
    bottom: 30px;
    z-index: 3;
    display: flex;
    align-items: center;
  }

  .brand-bottom img {
    height: 20px;
    width: auto;
    object-fit: contain;
    opacity: 0.9;
  }
</style>
</head>
<body>
  <div class="image-zone">
    {{#if image_url}}
    <img src="{{image_url}}" alt="">
    {{else}}
    <div class="fallback"></div>
    {{/if}}
  </div>

  <div class="content">
    <div class="page-badge">{{page_number}}</div>
    <h2 class="heading">{{title}}</h2>
    <div class="accent-underline"></div>
    <p class="body-text">{{body}}</p>
  </div>

  <div class="brand-bottom">
    <img src="{{brand_image}}" alt="{{brand_name}}">
  </div>
</body>
</html>
