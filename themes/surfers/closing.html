<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=720, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.css">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    width: 720px;
    height: 900px;
    overflow: hidden;
    font-family: '{{font}}', 'Pretendard', 'Noto Sans KR', sans-serif;
    position: relative;
  }

  /* 첫장과 동일한 배경 이미지 */
  .bg-image {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 0;
  }

  /* 라이트 카드 틴트 (테마 closing_tint) */
  .overlay {
    position: absolute;
    inset: 0;
    background: {{closing_tint}};
    z-index: 1;
  }

  .content {
    position: absolute;
    inset: 0;
    z-index: 2;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px;
  }

  /* 워드마크 로고 이미지 */
  .wordmark {
    height: 56px;
    width: auto;
    object-fit: contain;
    margin-bottom: 34px;
  }

  .tagline {
    font-size: 32px;
    font-weight: 800;
    color: {{ink_color}};
    text-align: center;
    letter-spacing: -0.025em;
    margin-bottom: 16px;
    word-break: keep-all;
  }

  /* 브랜드 블루 구분선 */
  .accent-line {
    width: 52px;
    height: 4px;
    background: {{primary_color}};
    border-radius: 3px;
    margin-bottom: 26px;
  }

  .cta-text {
    font-size: 19px;
    font-weight: 500;
    color: rgba(27,29,31,0.78);
    text-align: center;
    line-height: 1.6;
    word-break: keep-all;
    white-space: pre-line;
    margin-bottom: 46px;
  }

  .cta-text b {
    font-weight: 800;
    color: {{primary_color}};
  }

  .icons-row {
    display: flex;
    gap: 40px;
    align-items: center;
  }

  .icon-circle {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: #ffffff;
    border: 1.5px solid rgba(5,115,240,0.35);
    display: flex;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 10px rgba(5,115,240,0.12);
  }

  .icon-circle svg {
    width: 27px;
    height: 27px;
    fill: none;
    stroke: {{primary_color}};
    stroke-width: 2;
    stroke-linecap: round;
    stroke-linejoin: round;
  }
</style>
</head>
<body>
  {{#if image_url}}
  <img class="bg-image" src="{{image_url}}" alt="">
  {{/if}}

  <div class="overlay"></div>

  <div class="content">
    <img class="wordmark" src="{{wordmark_url}}" alt="logo">

    <p class="tagline">{{tagline}}</p>
    <div class="accent-line"></div>
    <p class="cta-text">{{{cta}}}</p>

    <div class="icons-row">
      <!-- 좋아요 -->
      <div class="icon-circle">
        <svg viewBox="0 0 24 24">
          <path d="M20.84 4.61a5.5 5.5 0 00-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 00-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 000-7.78z"/>
        </svg>
      </div>
      <!-- 댓글 -->
      <div class="icon-circle">
        <svg viewBox="0 0 24 24">
          <path d="M21 11.5a8.38 8.38 0 01-.9 3.8 8.5 8.5 0 01-7.6 4.7 8.38 8.38 0 01-3.8-.9L3 21l1.9-5.7a8.38 8.38 0 01-.9-3.8 8.5 8.5 0 014.7-7.6 8.38 8.38 0 013.8-.9h.5a8.48 8.48 0 018 8v.5z"/>
        </svg>
      </div>
      <!-- 저장 -->
      <div class="icon-circle">
        <svg viewBox="0 0 24 24">
          <path d="M19 21l-7-5-7 5V5a2 2 0 012-2h10a2 2 0 012 2z"/>
        </svg>
      </div>
    </div>
  </div>
</body>
</html>
